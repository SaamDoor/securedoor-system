<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#181818"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(200,168,93,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A85D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A87820;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(200,168,93,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0);stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="800" height="800" fill="url(#grid)"/>
  <rect width="800" height="800" fill="url(#bgGlow)"/>

  <!-- Door silhouette shape -->
  <rect x="280" y="120" width="240" height="480" rx="8" fill="rgba(200,168,93,0.08)" stroke="rgba(200,168,93,0.25)" stroke-width="1.5"/>
  <!-- Door frame inner -->
  <rect x="296" y="136" width="208" height="448" rx="4" fill="rgba(200,168,93,0.05)" stroke="rgba(200,168,93,0.15)" stroke-width="1"/>
  <!-- Door handle -->
  <rect x="470" y="355" width="12" height="50" rx="6" fill="url(#goldGrad)"/>
  <!-- Door panel decorations -->
  <rect x="310" y="155" width="180" height="90" rx="3" fill="none" stroke="rgba(200,168,93,0.2)" stroke-width="1"/>
  <rect x="310" y="260" width="180" height="140" rx="3" fill="none" stroke="rgba(200,168,93,0.2)" stroke-width="1"/>
  <rect x="310" y="415" width="180" height="140" rx="3" fill="none" stroke="rgba(200,168,93,0.2)" stroke-width="1"/>

  <!-- Logo area -->
  <rect x="300" y="650" width="200" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Company name text -->
  <text x="400" y="700" font-family="sans-serif" font-size="18" font-weight="700" fill="#C8A85D" text-anchor="middle" letter-spacing="1">گروه صنعتی مشعوف</text>
  <text x="400" y="724" font-family="sans-serif" font-size="11" fill="rgba(200,168,93,0.6)" text-anchor="middle" letter-spacing="3">MASHOUF INDUSTRIAL GROUP</text>
</svg>
